<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0 auto;
        }

        div {
            position: absolute;
            width: 300px;
            height: 350px;
            top: 50%;
            left: 50%;
            border: 1px solid gray;
            border-radius: 10px;
            transform: translate(-50%,-50%);
            box-shadow: 2px 2px 10px #909090;
        }

        div img {
            width: 300px;
            border-radius: 10px;
        }

        div span {
            display: block;
            color: gray;
            margin-top: 30px;
            padding: 5px;
        }


    </style>
</head>
<body>
    <div>
        <img src="./connect.png" alt="">
            <span>
                打破行业间壁垒，提供便捷的接入方式，实现不同企业、不同品牌、不同类型间的家电的数据互联互通和数据协同
            </span>
    </div>
</body>
</html>
