<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 450px;
            height: 460px;
            background-color: pink;
        }

        .top {
            width: 450px;
            height: 270px;
            background-color: aquamarine;
        }

        .foot {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 450px;
            height: 190px;
        }

        .foot .item {
            width: 100px;
            height: 140px;
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top"></div>
        <div class="foot">
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
        </div>
    </div>
</body>
</html>
